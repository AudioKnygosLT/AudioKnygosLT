<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Knygos LT — Biblioteka</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0d;
    --surface: #141416;
    --surface2: #1a1a1e;
    --border: #252528;
    --accent: #c8a96e;
    --accent2: #7eb8c9;
    --green: #7ec99a;
    --red: #c97e7e;
    --purple: #a07ec9;
    --orange: #c9a07e;
    --text: #e8e4dc;
    --muted: #5a5755;
    --muted2: #888480;
    --hover: #1c1c20;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 32px 48px 24px;
    position: sticky;
    top: 0;
    background: rgba(12,12,13,0.97);
    z-index: 100;
    backdrop-filter: blur(16px);
  }

  .header-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .header-left { display: flex; align-items: baseline; gap: 20px; }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  .count {
    color: var(--muted2);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .classify-btn {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .classify-btn:hover { background: var(--accent); color: var(--bg); }
  .classify-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* CONTROLS ROW */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 220px;
    max-width: 380px;
  }

  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    padding: 9px 14px 9px 36px;
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--accent); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.9rem;
    pointer-events: none;
  }

  /* GENRE FILTERS */
  .genre-filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .genre-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid var(--border);
    color: var(--muted2);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    background: none;
  }
  .genre-tag:hover { border-color: var(--muted2); color: var(--text); }
  .genre-tag.active { color: var(--bg); border-color: transparent; }

  /* Genre colors */
  .genre-tag[data-genre="Detektyvas"].active { background: var(--accent2); }
  .genre-tag[data-genre="Drama"].active { background: var(--purple); }
  .genre-tag[data-genre="Trileris"].active { background: var(--red); }
  .genre-tag[data-genre="Fantastika"].active { background: #6aaa8e; }
  .genre-tag[data-genre="Istorinis"].active { background: var(--accent); }
  .genre-tag[data-genre="Romantika"].active { background: #c97eaa; }
  .genre-tag[data-genre="Biografija"].active { background: var(--orange); }
  .genre-tag[data-genre="Siaubo"].active { background: #8e6a6a; }
  .genre-tag[data-genre="Saviugda"].active { background: var(--green); }
  .genre-tag[data-genre="Humoristinis"].active { background: #c9c07e; }
  .genre-tag[data-genre="Vaikams"].active { background: #7eaac9; }
  .genre-tag[data-genre="Kita"].active { background: var(--muted2); }

  /* PROGRESS */
  #progress-bar-wrap {
    display: none;
    margin-top: 14px;
    height: 3px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
  }
  #progress-label {
    font-size: 0.65rem;
    color: var(--muted2);
    margin-top: 6px;
    display: none;
  }

  /* TABLE */
  main { padding: 0 48px 64px; }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
  }

  thead th {
    text-align: left;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }

  .book-row {
    border-bottom: 1px solid rgba(37,37,40,0.7);
    transition: background 0.12s;
  }
  .book-row:hover { background: var(--hover); }
  .book-row td { padding: 10px 14px; vertical-align: middle; }

  .num { color: var(--muted); font-size: 0.68rem; width: 44px; text-align: right; }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: 0.92rem;
    color: var(--text);
  }

  .genre-cell { width: 130px; }

  .genre-badge {
    display: inline-block;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 0;
    background: var(--surface2);
    color: var(--muted2);
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .genre-badge.classified { background: var(--surface2); }
  .genre-badge[data-g="Detektyvas"] { color: var(--accent2); border-color: var(--accent2); }
  .genre-badge[data-g="Drama"] { color: var(--purple); border-color: var(--purple); }
  .genre-badge[data-g="Trileris"] { color: var(--red); border-color: var(--red); }
  .genre-badge[data-g="Fantastika"] { color: #6aaa8e; border-color: #6aaa8e; }
  .genre-badge[data-g="Istorinis"] { color: var(--accent); border-color: var(--accent); }
  .genre-badge[data-g="Romantika"] { color: #c97eaa; border-color: #c97eaa; }
  .genre-badge[data-g="Biografija"] { color: var(--orange); border-color: var(--orange); }
  .genre-badge[data-g="Siaubo"] { color: #c98e8e; border-color: #8e6a6a; }
  .genre-badge[data-g="Saviugda"] { color: var(--green); border-color: var(--green); }
  .genre-badge[data-g="Humoristinis"] { color: #c9c07e; border-color: #c9c07e; }
  .genre-badge[data-g="Vaikams"] { color: #7eaac9; border-color: #7eaac9; }

  .links { width: 110px; white-space: nowrap; }

  .btn-lt, .btn-en {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.05em;
    padding: 4px 9px;
    text-decoration: none;
    transition: all 0.15s;
    margin-right: 5px;
  }
  .btn-lt { border: 1px solid var(--accent); color: var(--accent); }
  .btn-lt:hover { background: var(--accent); color: var(--bg); }
  .btn-en { border: 1px solid var(--accent2); color: var(--accent2); }
  .btn-en:hover { background: var(--accent2); color: var(--bg); }

  .hidden { display: none !important; }

  #no-results {
    text-align: center;
    color: var(--muted);
    padding: 64px;
    font-size: 0.85rem;
    display: none;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-left">
      <h1>Audio Knygos LT</h1>
      <span class="count" id="visible-count">2080 knygų</span>
    </div>
    <button class="classify-btn" id="classify-btn" onclick="startClassification()">
      ✦ Nustatyti žanrus (AI)
    </button>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Ieškoti knygos ar autoriaus..." autocomplete="off">
    </div>
    <div class="genre-filters" id="genre-filters">
      <span style="font-size:0.65rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-right:4px;">Žanras:</span>
      <button class="genre-tag active" data-genre="Visi" onclick="filterGenre(this)">Visi</button>
      <button class="genre-tag" data-genre="Detektyvas" onclick="filterGenre(this)">Detektyvas</button>
      <button class="genre-tag" data-genre="Drama" onclick="filterGenre(this)">Drama</button>
      <button class="genre-tag" data-genre="Trileris" onclick="filterGenre(this)">Trileris</button>
      <button class="genre-tag" data-genre="Fantastika" onclick="filterGenre(this)">Fantastika</button>
      <button class="genre-tag" data-genre="Istorinis" onclick="filterGenre(this)">Istorinis</button>
      <button class="genre-tag" data-genre="Romantika" onclick="filterGenre(this)">Romantika</button>
      <button class="genre-tag" data-genre="Biografija" onclick="filterGenre(this)">Biografija</button>
      <button class="genre-tag" data-genre="Siaubo" onclick="filterGenre(this)">Siaubo</button>
      <button class="genre-tag" data-genre="Saviugda" onclick="filterGenre(this)">Saviugda</button>
      <button class="genre-tag" data-genre="Humoristinis" onclick="filterGenre(this)">Humoristinis</button>
      <button class="genre-tag" data-genre="Vaikams" onclick="filterGenre(this)">Vaikams</button>
      <button class="genre-tag" data-genre="Kita" onclick="filterGenre(this)">Kita</button>
    </div>
  </div>

  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div id="progress-label"></div>
</header>

<main>
  <table id="books-table">
    <thead>
      <tr>
        <th style="text-align:right">#</th>
        <th>Pavadinimas / Autorius</th>
        <th>Žanras</th>
        <th>Aprašymas</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="no-results">Knygų nerasta.</div>
</main>

<script>
// ── DATA (injected by Python) ──────────────────────────────────────────────
</script>
<script src="books_data.js"></script>
<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let activeGenre = 'Visi';
let searchQuery = '';
let classifying = false;

// ── RENDER ─────────────────────────────────────────────────────────────────
function buildTable() {
  const tbody = document.getElementById('tbody');
  const fragment = document.createDocumentFragment();
  BOOKS.forEach((b, i) => {
    const tr = document.createElement('tr');
    tr.className = 'book-row';
    tr.dataset.idx = i;
    tr.innerHTML = `
      <td class="num">${i + 1}</td>
      <td class="title">${escHtml(b.t)}</td>
      <td class="genre-cell"><span class="genre-badge" id="gb-${i}" data-g="${escHtml(b.g)}">${b.g || '—'}</span></td>
      <td class="links">
        <a href="${b.lt}" target="_blank" class="btn-lt">🇱🇹 LT</a>
        <a href="${b.en}" target="_blank" class="btn-en">🌐 EN</a>
      </td>`;
    fragment.appendChild(tr);
  });
  tbody.appendChild(fragment);
  updateVisibleCount();
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── FILTER ─────────────────────────────────────────────────────────────────
function applyFilters() {
  const rows = document.querySelectorAll('.book-row');
  let visible = 0;
  rows.forEach(row => {
    const idx = parseInt(row.dataset.idx);
    const b = BOOKS[idx];
    const titleMatch = b.t.toLowerCase().includes(searchQuery);
    const genreMatch = activeGenre === 'Visi' || b.g === activeGenre;
    if (titleMatch && genreMatch) {
      row.classList.remove('hidden');
      visible++;
    } else {
      row.classList.add('hidden');
    }
  });
  document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
  updateVisibleCount(visible);
}

function updateVisibleCount(n) {
  const total = BOOKS.length;
  if (n === undefined) n = total;
  document.getElementById('visible-count').textContent = n === total ? `${total} knygų` : `${n} / ${total}`;
}

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase();
  applyFilters();
});

function filterGenre(btn) {
  activeGenre = btn.dataset.genre;
  document.querySelectorAll('.genre-tag').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

// ── AI CLASSIFICATION ──────────────────────────────────────────────────────
async function startClassification() {
  if (classifying) return;
  classifying = true;
  const btn = document.getElementById('classify-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Klasifikuojama...';

  document.getElementById('progress-bar-wrap').style.display = 'block';
  document.getElementById('progress-label').style.display = 'block';

  const BATCH = 80;
  const total = BOOKS.length;
  let done = 0;

  const GENRES = ['Detektyvas','Drama','Trileris','Fantastika','Istorinis','Romantika','Biografija','Siaubo','Saviugda','Humoristinis','Vaikams','Kita'];

  for (let i = 0; i < total; i += BATCH) {
    const slice = BOOKS.slice(i, i + BATCH);
    const titles = slice.map((b, j) => `${j}. ${b.t}`).join('\n');

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: `Tu esi knygų žanrų klasifikatorius. Tau bus pateiktas sąrašas knygų pavadinimų (su numeriais). Grąžink TIKTAI JSON masyvą su žanrais tokia tvarka kaip sąraše. Galimi žanrai: ${GENRES.join(', ')}. Naudok tik šiuos žanrus. Grąžink tik JSON masyvą, be jokio teksto, be markdown. Pvz: ["Detektyvas","Drama","Fantastika"]`,
          messages: [{ role: 'user', content: titles }]
        })
      });

      const data = await resp.json();
      const text = data.content?.[0]?.text || '[]';
      const clean = text.replace(/```json|```/g, '').trim();
      let genres = [];
      try { genres = JSON.parse(clean); } catch(e) { genres = []; }

      slice.forEach((b, j) => {
        const g = genres[j];
        if (g && GENRES.includes(g)) {
          BOOKS[i + j].g = g;
          const badge = document.getElementById(`gb-${i + j}`);
          if (badge) {
            badge.textContent = g;
            badge.dataset.g = g;
            badge.classList.add('classified');
          }
        } else {
          BOOKS[i + j].g = 'Kita';
          const badge = document.getElementById(`gb-${i + j}`);
          if (badge) { badge.textContent = 'Kita'; badge.dataset.g = 'Kita'; }
        }
      });

    } catch(e) {
      console.error('Batch error:', e);
    }

    done += slice.length;
    const pct = Math.round(done / total * 100);
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-label').textContent = `Klasifikuota: ${done} / ${total} knygų`;

    // small delay between batches
    await new Promise(r => setTimeout(r, 300));
  }

  classifying = false;
  btn.disabled = false;
  btn.textContent = '✓ Žanrai nustatyti';
  document.getElementById('progress-label').textContent = `✓ Visos ${total} knygos klasifikuotos!`;

  // Re-apply filters in case genre filter is active
  applyFilters();
}

// ── INIT ───────────────────────────────────────────────────────────────────
buildTable();
</script>
</body>
</html>
